name: Update Repository Metadata

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 1 * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install Python packages
        run: pip install requests pyyaml

      - name: Fetch repository metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python << 'EOF'
          import requests
          import yaml

          repos = [
              "levyjeff/hamilton_filter",
              "levyjeff/anderson_rubin_ci",
              "levyjeff/simple_abm",
              "UrbanInstitute/pyspark-tutorials",
              "levyjeff/levyjeff.github.io"
          ]

          metadata = {}
          headers = {
              "Accept": "application/vnd.github+json"
          }

          for repo in repos:
              r = requests.get(
                  f"https://api.github.com/repos/{repo}",
                  headers=headers,
                  timeout=30,
              )

              r.raise_for_status()
              data = r.json()

              metadata[repo] = {
                  "stars": data["stargazers_count"],
                  "forks": data["forks_count"],
                  "language": data["language"],
                  "description": data["description"] or "",
                  "html_url": data["html_url"],
              }

          with open("_data/repo_metadata.yml", "w") as f:
              yaml.dump(metadata, f, sort_keys=False)
          EOF

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add _data/repo_metadata.yml

          git commit -m "Update repository metadata" && git push || exit 0
